<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — OnlyOffice Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
    }
    .login-logo { display: flex; align-items: center; gap: 12px; }
    .login-logo svg { width: 40px; height: 40px; }
    .login-logo span { font-size: 1.1rem; font-weight: 600; color: var(--text); }
    .login-title { font-size: 1.3rem; font-weight: 700; color: var(--text); text-align: center; margin: 0; }
    .login-sub { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin: -12px 0 0; line-height: 1.5; }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow .15s, background .15s;
      width: 100%;
      justify-content: center;
    }
    .btn-google:hover { box-shadow: 0 1px 6px rgba(0,0,0,.3); background: #f8f9fa; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
    .login-error {
      background: rgba(220,53,69,.15);
      border: 1px solid rgba(220,53,69,.4);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.82rem;
      color: #f88;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }
    .login-error.hidden { display: none; }
    .login-divider { width: 100%; height: 1px; background: var(--border); }
    .login-footer { font-size: 0.75rem; color: var(--text-muted); text-align: center; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#446995"/>
        <rect x="7" y="10" width="18" height="3" rx="1.5" fill="#fff"/>
        <rect x="7" y="15" width="13" height="3" rx="1.5" fill="#fff"/>
        <rect x="7" y="20" width="9" height="3" rx="1.5" fill="#fff"/>
      </svg>
      <span>OnlyOffice Dashboard</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in with your Google Workspace account to continue.</p>

    <div class="login-error hidden" id="loginError"></div>

    <a class="btn-google" href="/auth/google">
      <!-- Google "G" logo -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <div class="login-divider"></div>
    <p class="login-footer">Access is restricted to authorised accounts only.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    const el = document.getElementById('loginError');
    const msgs = {
      unauthorized: 'Your Google account is not authorised to access this dashboard.',
      oauth: 'Google sign-in failed. Please try again.',
    };
    if (err) { el.textContent = msgs[err] || 'Sign-in error. Please try again.'; el.classList.remove('hidden'); }
  </script>
</body>
</html>
