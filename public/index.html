<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnlyOffice Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="#446995"/>
          <rect x="7" y="10" width="18" height="3" rx="1.5" fill="#fff"/>
          <rect x="7" y="15" width="13" height="3" rx="1.5" fill="#fff"/>
          <rect x="7" y="20" width="9" height="3" rx="1.5" fill="#fff"/>
        </svg>
        <span>OnlyOffice Dashboard</span>
      </div>
      <!-- App nav -->
      <nav class="app-nav">
        <button class="nav-btn active" data-view="files">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
          Files
        </button>
        <button class="nav-btn" data-view="email">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
          Email
          <span class="nav-badge hidden" id="emailBadge"></span>
        </button>
      </nav>
      <div class="header-actions">
        <button class="btn btn-primary" id="btnUpload">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a1 1 0 01.707.293l4 4a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L6.707 7.707A1 1 0 015.293 6.293l4-4A1 1 0 0110 2z"/><path d="M3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg>
          Upload
        </button>
        <button class="btn btn-ghost" id="btnNewDoc" title="New document">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
          New
        </button>
        <div class="user-pill" id="userPill" style="display:none">
          <span id="userEmail"></span>
          <button class="btn btn-ghost btn-sm" id="btnLogout">Sign out</button>
        </div>
        <a class="btn btn-ghost" id="btnGoogleSignIn" href="/auth/google" style="display:none">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd"/></svg>
          Connect Gmail
        </a>
      </div>
    </div>
  </header>

  <!-- Hidden upload input -->
  <input type="file" id="fileInput" hidden accept=".docx,.doc,.odt,.rtf,.txt,.pdf,.xlsx,.xls,.ods,.csv,.pptx,.ppt,.odp" />

  <!-- New document modal -->
  <div class="modal-overlay hidden" id="newDocModal">
    <div class="modal">
      <h2>New Document</h2>
      <div class="new-doc-types">
        <button class="doc-type-btn" data-type="docx">
          <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="#2B5FD9"/><rect x="10" y="13" width="20" height="3" rx="1.5" fill="#fff"/><rect x="10" y="19" width="15" height="3" rx="1.5" fill="#fff"/><rect x="10" y="25" width="10" height="3" rx="1.5" fill="#fff"/></svg>
          <span>Document</span>
          <small>.docx</small>
        </button>
        <button class="doc-type-btn" data-type="xlsx">
          <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="#21A366"/><rect x="10" y="10" width="8" height="8" rx="1" fill="#fff" opacity=".9"/><rect x="22" y="10" width="8" height="8" rx="1" fill="#fff" opacity=".9"/><rect x="10" y="22" width="8" height="8" rx="1" fill="#fff" opacity=".9"/><rect x="22" y="22" width="8" height="8" rx="1" fill="#fff" opacity=".9"/></svg>
          <span>Spreadsheet</span>
          <small>.xlsx</small>
        </button>
        <button class="doc-type-btn" data-type="pptx">
          <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="#D04B24"/><rect x="8" y="11" width="24" height="16" rx="2" fill="#fff" opacity=".9"/><rect x="16" y="29" width="8" height="3" rx="1.5" fill="#fff" opacity=".7"/><rect x="13" y="32" width="14" height="2" rx="1" fill="#fff" opacity=".5"/></svg>
          <span>Presentation</span>
          <small>.pptx</small>
        </button>
      </div>
      <div class="form-row">
        <label for="newDocName">File name</label>
        <input type="text" id="newDocName" placeholder="Untitled" maxlength="200" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btnCancelNew">Cancel</button>
        <button class="btn btn-primary" id="btnConfirmNew">Create &amp; Open</button>
      </div>
    </div>
  </div>

  <!-- Upload progress toast -->
  <div class="toast hidden" id="toast"></div>

  <main>
    <!-- Toolbar / filter bar -->
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="word">
          <span class="dot dot-word"></span>Documents
        </button>
        <button class="filter-tab" data-filter="cell">
          <span class="dot dot-cell"></span>Spreadsheets
        </button>
        <button class="filter-tab" data-filter="slide">
          <span class="dot dot-slide"></span>Presentations
        </button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 20 20" fill="currentColor" class="search-icon"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input type="text" id="searchInput" placeholder="Search files…" />
      </div>
    </div>

    <!-- File grid -->
    <div class="file-grid" id="fileGrid">
      <!-- populated by JS -->
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="emptyState">
      <svg viewBox="0 0 64 64" fill="none"><rect x="12" y="8" width="40" height="48" rx="4" fill="#e8edf5"/><rect x="20" y="20" width="24" height="3" rx="1.5" fill="#b0bdd4"/><rect x="20" y="27" width="18" height="3" rx="1.5" fill="#b0bdd4"/><rect x="20" y="34" width="12" height="3" rx="1.5" fill="#b0bdd4"/></svg>
      <p>No files yet</p>
      <span>Upload a document or create a new one to get started.</span>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════════
       Email panel  (shown when nav-btn[data-view=email] active)
       ═══════════════════════════════════════════════════════ -->
  <div id="emailPanel" class="view-panel hidden">
    <!-- Not-signed-in state -->
    <div id="emailSignInPrompt" class="email-signin-prompt hidden">
      <svg viewBox="0 0 48 48" fill="none" style="width:56px;height:56px">
        <rect width="48" height="48" rx="12" fill="#1a2236"/>
        <path d="M8 16l16 11L40 16" stroke="#446995" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="8" y="14" width="32" height="22" rx="3" stroke="#446995" stroke-width="2.5"/>
      </svg>
      <p>Connect your Google Workspace account to see your Gmail inbox here.</p>
      <a class="btn btn-primary" href="/auth/google">
        <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2z"/></svg>
        Sign in with Google
      </a>
    </div>

    <!-- Main email layout -->
    <div id="emailLayout" class="email-layout hidden">
      <!-- Sidebar: label list -->
      <aside class="email-sidebar">
        <button class="btn btn-primary btn-compose" id="btnCompose">✏ Compose</button>
        <ul class="label-list" id="labelList"></ul>
      </aside>

      <!-- Message list -->
      <section class="email-list-pane" id="emailListPane">
        <div class="email-list-toolbar">
          <input type="text" id="emailSearch" placeholder="Search mail…" />
          <button class="btn btn-ghost btn-sm" id="btnEmailRefresh">↻</button>
        </div>
        <ul class="email-list" id="emailList">
          <li class="email-loading">Loading…</li>
        </ul>
        <div class="email-list-footer">
          <button class="btn btn-ghost btn-sm hidden" id="btnEmailNext">Load more</button>
        </div>
      </section>

      <!-- Message reader -->
      <section class="email-reader" id="emailReader">
        <div class="email-reader-placeholder">
          <svg viewBox="0 0 24 24" fill="none" style="width:48px;height:48px;opacity:.3">
            <path d="M3 8l9 6 9-6M3 8v10a1 1 0 001 1h16a1 1 0 001-1V8M3 8a1 1 0 011-1h16a1 1 0 011 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <p>Select a message to read</p>
        </div>
      </section>
    </div>
  </div>

  <!-- Compose modal -->
  <div class="modal-overlay hidden" id="composeModal">
    <div class="modal modal-wide">
      <h2>New Message</h2>
      <div class="form-row"><label>To</label><input type="email" id="composeTo" placeholder="recipient@example.com" /></div>
      <div class="form-row"><label>Subject</label><input type="text" id="composeSubject" placeholder="Subject" /></div>
      <div class="form-row">
        <label>Message</label>
        <textarea id="composeBody" rows="10" placeholder="Write your message…" style="resize:vertical"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btnCancelCompose">Cancel</button>
        <button class="btn btn-primary" id="btnSendEmail">Send</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/email.js"></script>
</body>
</html>
