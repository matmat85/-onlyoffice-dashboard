<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnlyOffice Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #1e2430; }

    #header {
      height: 44px;
      background: #1e2430;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    #header a {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #8fa3c0;
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    #header a:hover { color: #fff; }
    #header a svg { width: 16px; height: 16px; }
    #docTitle {
      flex: 1;
      color: #e2eaf5;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #editorWrap {
      width: 100%;
      height: calc(100% - 44px);
    }
    #editor {
      width: 100%;
      height: 100%;
      border: none;
    }
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #1e2430;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #8fa3c0;
      font-size: 14px;
      z-index: 100;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2e3a50;
      border-top-color: #446995;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #errorScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: #1e2430;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #e84b4b;
      font-size: 15px;
      z-index: 100;
    }
    #errorScreen.visible { display: flex; }
    #errorScreen p { color: #8fa3c0; font-size: 13px; max-width: 400px; text-align: center; }
    #errorScreen a { color: #6ea8fe; text-decoration: none; font-size: 13px; margin-top: 8px; }

    #saveCopyModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 120;
      background: rgba(12, 16, 24, 0.72);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #saveCopyModal.visible { display: flex; }
    .save-copy-card {
      width: min(560px, 100%);
      background: #141a24;
      border: 1px solid #2e3a50;
      border-radius: 12px;
      padding: 16px;
      color: #d6e2f2;
    }
    .save-copy-card h3 { font-size: 16px; margin-bottom: 10px; }
    .save-copy-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }
    .save-copy-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #8fa3c0;
    }
    .save-copy-field input,
    .save-copy-field select {
      width: 100%;
      height: 36px;
      border: 1px solid #31435e;
      background: #0f1520;
      color: #e2eaf5;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
    }
    .save-copy-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    .save-copy-actions button {
      border: 0;
      border-radius: 8px;
      height: 34px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 13px;
    }
    #saveCopyCancel { background: #243247; color: #c7d7ee; }
    #saveCopyConfirm { background: #2e6ad9; color: #fff; }
  </style>
</head>
<body>
  <div id="header">
    <a href="/" id="backLink">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
      Dashboard
    </a>
    <span id="docTitle">Loading…</span>
  </div>

  <div id="editorWrap">
    <div id="editor"></div>
  </div>

  <div id="loadingScreen">
    <div class="spinner"></div>
    <span id="loadingMsg">Fetching config…</span>
    <div id="loadingSteps" style="margin-top:14px;font-size:11px;color:#4a6a90;text-align:left;line-height:2"></div>
  </div>

  <div id="errorScreen">
    <svg viewBox="0 0 24 24" fill="currentColor" style="width:40px;height:40px"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <strong id="errorTitle">Failed to load editor</strong>
    <p id="errorMsg">Could not connect to the OnlyOffice Document Server.</p>
    <a href="/">← Back to Dashboard</a>
  </div>

  <div id="saveCopyModal" role="dialog" aria-modal="true" aria-labelledby="saveCopyTitle">
    <div class="save-copy-card">
      <h3 id="saveCopyTitle">Save Copy</h3>
      <div class="save-copy-grid">
        <div class="save-copy-field">
          <label for="saveCopyName">Copy name</label>
          <input id="saveCopyName" type="text" />
        </div>
        <div class="save-copy-field">
          <label for="saveCopySpace">Target space</label>
          <select id="saveCopySpace">
            <option value="private">My Files</option>
            <option value="shared">Team Shared</option>
            <option value="library">Business Library</option>
          </select>
        </div>
        <div class="save-copy-field">
          <label for="saveCopyFolder">Target folder</label>
          <select id="saveCopyFolder"></select>
        </div>
      </div>
      <div class="save-copy-actions">
        <button id="saveCopyCancel" type="button">Cancel</button>
        <button id="saveCopyConfirm" type="button">Save Copy</button>
      </div>
    </div>
  </div>

  <script>
    let editorReady = false;
    const SPACE_ROOTS = { private: 'root-private', shared: 'root', library: 'root-library' };
    const SPACE_LABELS = { private: 'My Files', shared: 'Team Shared', library: 'Business Library' };
    const query = new URLSearchParams(location.search);
    let saveCopySpace = SPACE_ROOTS[query.get('space')] ? query.get('space') : 'shared';
    let saveCopyFolderId = query.get('folderId') || SPACE_ROOTS[saveCopySpace];
    const saveCopyModal = document.getElementById('saveCopyModal');
    const saveCopyNameInput = document.getElementById('saveCopyName');
    const saveCopySpaceSelect = document.getElementById('saveCopySpace');
    const saveCopyFolderSelect = document.getElementById('saveCopyFolder');
    const saveCopyCancelBtn = document.getElementById('saveCopyCancel');
    const saveCopyConfirmBtn = document.getElementById('saveCopyConfirm');

    function markEditorReady() {
      if (editorReady) return;
      editorReady = true;
      document.getElementById('loadingScreen').style.display = 'none';
    }

    function step(msg, ok = true) {
      const el = document.getElementById('loadingSteps');
      if (el) el.innerHTML += `<div>${ok ? '✔' : '…'} ${msg}</div>`;
      document.getElementById('loadingMsg').textContent = msg;
    }

    async function apiJson(url) {
      const resp = await fetch(url);
      const body = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(body.error || `HTTP ${resp.status}`);
      return body;
    }

    async function fetchFolderTree(space, parentId, trail = []) {
      const folders = await apiJson(`/api/folders?parentId=${encodeURIComponent(parentId)}`);
      const scoped = folders.filter((folder) => folder.space === space && !folder.isTrash);
      const nested = await Promise.all(scoped.map(async (folder) => {
        const pathItems = [...trail, folder.name];
        const children = await fetchFolderTree(space, folder.id, pathItems);
        return [{ id: folder.id, label: pathItems.join(' / ') }, ...children];
      }));
      return nested.flat();
    }

    function ensureFileTypeExtension(name, fileType) {
      const trimmed = String(name || '').trim();
      if (!trimmed) return '';
      if (!fileType) return trimmed;
      const expected = `.${String(fileType).toLowerCase()}`;
      if (trimmed.toLowerCase().endsWith(expected)) return trimmed;
      return `${trimmed}${expected}`;
    }

    async function renderSaveCopyFolderOptions(space, preferredFolderId) {
      const rootId = SPACE_ROOTS[space] || SPACE_ROOTS.shared;
      const rootLabel = SPACE_LABELS[space] || 'Root';
      const folders = [{ id: rootId, label: rootLabel }, ...(await fetchFolderTree(space, rootId, [rootLabel]))];
      saveCopyFolderSelect.innerHTML = folders
        .map((folder) => `<option value="${folder.id}">${folder.label}</option>`)
        .join('');

      const selected = folders.some((f) => f.id === preferredFolderId) ? preferredFolderId : rootId;
      saveCopyFolderSelect.value = selected;
    }

    async function chooseSaveCopyDestination(defaultTitle, defaultFileType) {
      const initialSpace = SPACE_ROOTS[saveCopySpace] ? saveCopySpace : 'shared';
      saveCopySpaceSelect.value = initialSpace;
      saveCopyNameInput.value = ensureFileTypeExtension(defaultTitle || 'Copy', defaultFileType) || 'Copy';

      await renderSaveCopyFolderOptions(initialSpace, saveCopyFolderId);
      saveCopyModal.classList.add('visible');
      saveCopyNameInput.focus();
      saveCopyNameInput.select();

      return new Promise((resolve) => {
        const cleanup = () => {
          saveCopyModal.classList.remove('visible');
          saveCopySpaceSelect.onchange = null;
          saveCopyCancelBtn.onclick = null;
          saveCopyConfirmBtn.onclick = null;
        };

        saveCopySpaceSelect.onchange = async () => {
          const pickedSpace = saveCopySpaceSelect.value;
          try {
            await renderSaveCopyFolderOptions(pickedSpace, SPACE_ROOTS[pickedSpace]);
          } catch (e) {
            step(`Folder load failed: ${e.message}`);
          }
        };

        saveCopyCancelBtn.onclick = () => {
          cleanup();
          resolve(null);
        };

        saveCopyConfirmBtn.onclick = () => {
          const pickedSpace = saveCopySpaceSelect.value;
          const folderId = saveCopyFolderSelect.value;
          const folderLabel = saveCopyFolderSelect.options[saveCopyFolderSelect.selectedIndex]?.text || 'Selected folder';
          const title = ensureFileTypeExtension(saveCopyNameInput.value, defaultFileType);
          if (!title) {
            step('Copy name is required');
            saveCopyNameInput.focus();
            return;
          }
          if (!folderId) {
            step('Target folder is required');
            return;
          }

          saveCopySpace = pickedSpace;
          saveCopyFolderId = folderId;
          cleanup();
          resolve({
            space: pickedSpace,
            folderId,
            folderLabel,
            title,
          });
        };
      });
    }

    function initEditor(config, fileId) {
      step('api.js loaded — starting editor');
      try {
        const withEvents = {
          ...config,
          events: {
            ...(config.events || {}),
            onAppReady: function() {
              // Some formats (for example CSV import flows) may not emit
              // onDocumentReady immediately, but the editor is usable.
              markEditorReady();
            },
            onDocumentReady: function() {
              markEditorReady();
            },
            onRequestSaveAs: async function(event) {
              const data = event && event.data ? event.data : {};
              const url = data.url || '';
              const title = data.title || 'document';
              const fileType = data.fileType || '';
              if (!url) {
                showError('Save Copy failed', 'OnlyOffice did not provide a download URL.');
                return;
              }

              let destination;
              try {
                destination = await chooseSaveCopyDestination(title, fileType);
              } catch (e) {
                step(`Save Copy destination error: ${e.message}`);
                destination = null;
              }

              if (destination) {
                step(`Saving copy into dashboard…`, false);
                try {
                  const saveResp = await fetch(`/api/files/${encodeURIComponent(fileId)}/save-copy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      url,
                      title: destination.title,
                      fileType,
                      folderId: destination.folderId,
                      space: destination.space,
                    }),
                  });
                  if (!saveResp.ok) {
                    const err = await saveResp.json().catch(() => ({}));
                    throw new Error(err.error || `HTTP ${saveResp.status}`);
                  }
                  step(`Saved copy into dashboard: ${destination.title} -> ${destination.folderLabel}`);
                } catch (e) {
                  step(`Save Copy storage failed: ${e.message}`);
                }
              } else {
                step('Save Copy to dashboard cancelled');
              }

              // Required by OnlyOffice for the Save Copy as... menu item to appear.
              const link = document.createElement('a');
              link.href = url;
              link.download = destination?.title || title;
              link.rel = 'noopener';
              link.target = '_blank';
              document.body.appendChild(link);
              link.click();
              link.remove();
              step(`Save Copy download started — ${destination?.title || title}`);
            },
            onError: function(event) {
              const data = event && event.data ? event.data : {};
              const code = typeof data.errorCode !== 'undefined' ? `code ${data.errorCode}` : 'unknown code';
              const message = data.errorDescription || data.errorMessage || 'No details returned by OnlyOffice';
              showError('OnlyOffice reported an error', `${code}: ${message}`);
            },
          },
        };

        // eslint-disable-next-line no-undef
        new DocsAPI.DocEditor('editor', withEvents);
        step('DocsAPI.DocEditor created — waiting for document…');

        setTimeout(() => {
          if (!editorReady) {
            showError(
              'Editor is taking too long to load',
              'OnlyOffice could not download the file or the JWT secret does not match. ' +
              'Test the file URL below in a browser on the OnlyOffice server to confirm it is reachable.'
            );
          }
        }, 60000);
      } catch (e) {
        showError('Editor initialisation failed', e.message);
      }
    }

    function showError(title, msg) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('errorTitle').textContent = title;
      if (msg) document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorScreen').classList.add('visible');
    }

    (async () => {
      const fileId = location.pathname.split('/').pop();
      if (!fileId) { showError('No file ID in URL'); return; }

      step('Fetching editor config from dashboard…', false);
      let cfg;
      try {
        const resp = await fetch(`/api/editor-config/${fileId}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        cfg = await resp.json();
      } catch (e) {
        showError('Could not fetch editor config', e.message);
        return;
      }

      document.getElementById('docTitle').textContent = cfg.config.document.title;
      document.title = cfg.config.document.title + ' \u2014 OnlyOffice';
      const fileUrl = cfg.config.document.url;
      step(`Config OK — file: ${fileUrl}`);

      // Quick check: can the browser reach the file URL?
      step(`Testing file reachability…`, false);
      try {
        const probe = await fetch(fileUrl, { method: 'HEAD' });
        step(`File HEAD ${probe.status} — ${probe.ok ? 'reachable ✓' : 'returned error (OnlyOffice may still work)'}`);
      } catch {
        step(`File HEAD failed (CORS may block this — OnlyOffice server-side check is what matters)`);
      }

      // Load the OnlyOffice API script.
      // Add a cache-busting query to avoid stale edge-cached redirects.
      step(`Loading api.js from ${cfg.onlyofficeUrl}…`, false);
      const script = document.createElement('script');
      script.src = `${cfg.onlyofficeUrl}/web-apps/apps/api/documents/api.js?v=${Date.now()}`;
      script.onload = () => initEditor(cfg.config, fileId);
      script.onerror = () => showError(
        'Could not load OnlyOffice API',
        `Could not reach: ${cfg.onlyofficeUrl}/web-apps/apps/api/documents/api.js — is the Document Server running?`
      );
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
